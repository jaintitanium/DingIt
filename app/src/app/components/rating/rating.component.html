<div class="rating rating-md rating-half">
    <input type="radio" name="rating-10" class="rating-hidden" />
    @for(val of ratings; track val) {
        <input type="radio" name="rating-10" class="bg-primary mask mask-bell mask-half-1" [checked]="this.show(val - 0.5)" [disabled]="!allowInput"/>
        <input type="radio" name="rating-10" class="bg-primary mask mask-bell mask-half-2" [checked]="this.show(val)" [disabled]="!allowInput"/>
    }
    <input type="radio" name="rating-10" class="rating-hidden" [disabled]="true" />
</div>
