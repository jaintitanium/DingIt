<!-- @if (form && name) { -->
    <div class="rating rating-lg rating-half" 
        [ngClass]="{ 'rating-sm': size == 'sm', 'rating-md': size == 'md', 'rating-lg': size == 'lg' }"
    >
        <input type="radio" name="rating-10" class="rating-hidden" [checked]="value == null" (click)="value = null" [disabled]="!allowInput"/>
        @for(val of ratings; track val) {
            <input type="radio" name="rating-10" class="bg-primary mask mask-bell mask-half-1" [checked]="this.show(val - 0.5)" (click)="value = (val - 0.5)" [disabled]="!allowInput"/>
            <input type="radio" name="rating-10" class="bg-primary mask mask-bell mask-half-2" [checked]="this.show(val)" (click)="value = val" [disabled]="!allowInput"/>
        }
        <input type="radio" name="rating-10" class="rating-hidden" [disabled]="true" />

        
    </div>
