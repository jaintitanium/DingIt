<div 
    @fade
    *ngIf="_message" class="toast toast-center">
    <div *ngIf="type == 'error'" class="alert alert-error">
        <span>{{_message}}</span>
    </div>
    <div *ngIf="type == 'info'" class="alert alert-info">
        <span>{{_message}}</span>
    </div>
    <div *ngIf="type == 'warning'" class="alert alert-warning">
        <span>{{_message}}</span>
    </div>
</div>
